<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bharathi Vidyalaya Nursery and Primary School</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f172a;
  --accent:#2563eb;
  --bg:#f8fafc;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--primary);
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:0 15px;
}

/* NAV */
nav{
  background:white;
  padding:12px 0;
  border-bottom:1px solid #eee;
  position:sticky;
  top:0;
}
.nav-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
nav h2{font-size:16px;}
nav button{
  background:#e2e8f0;
  border:none;
  padding:5px 8px;
  margin-left:5px;
  border-radius:5px;
  font-size:12px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 10px;
  background:white;
}
.hero h1{font-size:22px;}
.hero p{font-size:14px;margin:10px 0;color:#555;}
.btn{
  display:inline-block;
  background:var(--accent);
  color:white;
  padding:10px 16px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
}

/* SECTION */
.section{padding:40px 0;}
.section h2{
  text-align:center;
  font-size:18px;
  margin-bottom:20px;
}

/* GRID */
.grid{
  display:grid;
  gap:15px;
}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  border:1px solid #eee;
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

/* IMAGE */
.image{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  margin-top:10px;
}

/* FORM */
input,textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:5px;
}
.submit{
  width:100%;
  background:var(--accent);
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
}

/* FOOTER */
footer{
  background:white;
  padding:20px;
  text-align:center;
  border-top:1px solid #eee;
}

/* DESKTOP */
@media(min-width:768px){
  .hero h1{font-size:40px;}
  .hero p{font-size:16px;}

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .image{
    height:220px;
  }
}

@media(min-width:1024px){
  .grid{
    grid-template-columns:repeat(3,1fr);
  }
}
</style>
</head>

<body>

<nav>
  <div class="container nav-inner">
    <h2>Bharathi Vidyalaya</h2>
    <div>
      <button onclick="setLang('en')">EN</button>
      <button onclick="setLang('ta')">TA</button>
    </div>
  </div>
</nav>

<section class="hero">
  <h1 id="title">Admissions Open</h1>
  <p id="tagline">Building Strong Foundations</p>
  <a href="#form" class="btn">Apply Now</a>
</section>

<section class="section">
  <div class="container">
    <h2>Achievements</h2>
    <div class="grid">

      <div class="card">
        <h3>🎭 Arangetram</h3>
        <p>Students performed Arangetram at 3rd standard.</p>
        <img class="image" src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c">
      </div>

      <div class="card">
        <h3>🏆 Sports</h3>
        <p>Students win prizes in interschool events.</p>
        <img class="image" src="https://images.unsplash.com/photo-1526676037777-05a232554f77">
      </div>

    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <h2>Admission</h2>
    <form id="form" onsubmit="sendWhatsApp(event)">
      <input id="name" placeholder="Student Name" required>
      <input id="class" placeholder="Class" required>
      <input id="phone" placeholder="Phone" required>
      <textarea id="msg" placeholder="Message"></textarea>
      <button class="submit">Submit</button>
    </form>
  </div>
</section>

<footer>
  <p>© Bharathi Vidyalaya School</p>
</footer>

<script>
function sendWhatsApp(e){
  e.preventDefault();
  let text=`Name:${name.value}%0AClass:${class.value}%0APhone:${phone.value}`;
  window.open(`https://wa.me/918015748739?text=${text}`);
}

function setLang(lang){
if(lang=="ta"){
title.innerText="சேர்க்கை நடைபெறுகிறது";
tagline.innerText="எண்ணிய முடிதல் வேண்டும்";
}else{
title.innerText="Admissions Open";
tagline.innerText="Building Strong Foundations";
}
}
</script>

</body>
</html>
